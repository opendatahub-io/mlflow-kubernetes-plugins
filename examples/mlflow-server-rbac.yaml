apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: mlflow-kubernetes-plugins-server
rules:
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["list", "watch"]
  - apiGroups: ["mlflow.kubeflow.org"]
    resources: ["mlflowconfigs"]
    verbs: ["list", "watch"]
  - apiGroups: [""]
    resources: ["secrets"]
    # MLflowConfig fixes spec.artifactRootSecret to "mlflow-artifact-connection".
    # On Kubernetes 1.27+, field-selector authorization lets this stay scoped to
    # metadata.name=mlflow-artifact-connection for list/watch requests too.
    # On older clusters this rule will not authorize the secret watch, so use a
    # broader secrets rule if you need per-namespace artifact root overrides there.
    resourceNames: ["mlflow-artifact-connection"]
    verbs: ["list", "watch"]
  - apiGroups: ["authorization.k8s.io"]
    resources: ["subjectaccessreviews"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: mlflow-kubernetes-plugins-server
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: mlflow-kubernetes-plugins-server
subjects:
  - kind: ServiceAccount
    name: mlflow-server
    namespace: mlflow
