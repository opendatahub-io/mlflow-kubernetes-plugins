name: Tests

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-kubernetes-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test Go API package
        run: go test ./...

      - name: Verify generated Kubernetes API artifacts
        run: make verify-generated

  verify-crd-on-kind:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create Kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          wait: 2m

      - name: Apply MLflowConfig CRD
        run: kubectl apply -f config/crd/bases/mlflow.kubeflow.org_mlflowconfigs.yaml

      - name: Verify CRD is established
        run: |
          kubectl wait --for=condition=Established --timeout=60s crd/mlflowconfigs.mlflow.kubeflow.org
          kubectl get crd mlflowconfigs.mlflow.kubeflow.org -o yaml

      - name: Verify valid MLflowConfig resource applies
        run: |
          kubectl create namespace test-mlflow
          cat <<'EOF' | kubectl apply -f -
          apiVersion: mlflow.kubeflow.org/v1
          kind: MLflowConfig
          metadata:
            name: mlflow
            namespace: test-mlflow
          spec:
            artifactRootSecret: mlflow-artifact-connection
            artifactRootPath: experiments
          EOF
          kubectl get mlflowconfig -n test-mlflow mlflow -o yaml

  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: |
          pip install mlflow
          pip install -e ".[dev]"

      - name: Lint
        run: make python-lint

      - name: Run tests
        run: make python-test

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Build distribution artifacts
        run: |
          pip install build
          python -m build
