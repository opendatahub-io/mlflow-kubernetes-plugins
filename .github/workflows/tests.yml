name: Tests

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.12"
          enable-cache: true
      - name: Sync development dependencies
        run: uv sync --extra dev
      - name: Run pre-commit
        run: uv run pre-commit run --all-files

  verify-kubernetes-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test Go API package
        run: go test ./...

      - name: Verify generated Kubernetes API artifacts
        run: make verify-generated

  verify-crd-on-kind:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create Kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          wait: 2m

      - name: Apply MLflowConfig CRD
        run: kubectl apply -f config/crd/bases/mlflow.kubeflow.org_mlflowconfigs.yaml

      - name: Verify CRD is established
        run: |
          kubectl wait --for=condition=Established --timeout=60s crd/mlflowconfigs.mlflow.kubeflow.org
          kubectl get crd mlflowconfigs.mlflow.kubeflow.org -o yaml

      - name: Verify valid MLflowConfig resource applies
        run: |
          kubectl create namespace test-mlflow
          cat <<'EOF' | kubectl apply -f -
          apiVersion: mlflow.kubeflow.org/v1
          kind: MLflowConfig
          metadata:
            name: mlflow
            namespace: test-mlflow
          spec:
            artifactRootSecret: mlflow-artifact-connection
            artifactRootPath: experiments
          EOF
          kubectl get mlflowconfig -n test-mlflow mlflow -o yaml

  lint-and-test:
    runs-on: ubuntu-latest
    needs: pre-commit
    name: lint-and-test (${{ matrix.python-version }}, mlflow ${{ matrix.mlflow-version }})
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
        # Keep quoted so YAML does not coerce 3.10 to 3.1.
        mlflow-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Install dependencies
        run: |
          uv venv
          uv pip install -e ".[dev]" "mlflow~=${{ matrix.mlflow-version }}.0"

      - name: Lint
        run: make python-lint

      - name: Run tests
        run: make python-test

  test-static-prefix:
    runs-on: ubuntu-latest
    name: test-static-prefix (3.12, mlflow ${{ matrix.mlflow-version }})
    strategy:
      fail-fast: false
      matrix:
        # Keep quoted so YAML does not coerce 3.10 to 3.1.
        mlflow-version: ["3.10", "3.11", "3.12"]
    env:
      _MLFLOW_STATIC_PREFIX: /mlflow
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install dependencies
        run: |
          uv venv
          uv pip install -e ".[dev]" "mlflow~=${{ matrix.mlflow-version }}.0"

      - name: Run tests with static prefix
        run: make python-test

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Build distribution artifacts
        run: uv build
